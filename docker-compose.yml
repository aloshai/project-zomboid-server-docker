services:
  ProjectZomboidDedicatedServer:
    image: danixu86/project-zomboid-dedicated-server:latest
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Steam beta branch (default = Build 42 unstable). See README for alternatives.
        STEAM_BETA: ${STEAM_BETA:-unstable}
    env_file:
      - .env
    ports:
      # Game traffic is raw UDP/TCP and is published directly on the host.
      # (Reverse proxies can't route by domain for non-HTTP game packets.)
      - "16261:16261/udp"
      - "16262:16262/udp"
      - "27015:27015/tcp"
    expose:
      # The web admin UI is reached internally by Traefik on the dokploy network.
      - "8080/tcp"
    networks:
      - dokploy-network
    volumes:
      # Server data
      - zomboid-data:/home/steam/Zomboid
      # Workshop mods folder
      - zomboid-workshop:/home/steam/pz-dedicated/steamapps/workshop
    # The web admin UI (port 8080) is exposed via Dokploy's Domains manager
    # (Dokploy generates the Traefik router + Let's Encrypt cert for it), so no
    # manual Traefik labels are needed here. Add the domain in Dokploy → the
    # compose service → Domains, pointing at service "ProjectZomboidDedicatedServer"
    # port 8080.

networks:
  dokploy-network:
    external: true

volumes:
  zomboid-data:
  zomboid-workshop:
